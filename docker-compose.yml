version: '3.8'

services:
  jarvis:
    build: .
    container_name: jarvis-ai
    stdin_open: true
    tty: true
    # Audio device passthrough
    devices:
      - /dev/snd:/dev/snd
    # Or use PulseAudio socket
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
      - ./.env:/app/.env:ro
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    # Uncomment for GUI support (requires X11 forwarding)
    # environment:
    #   - DISPLAY=${DISPLAY}
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # devices:
    #   - /dev/dri:/dev/dri
    # network_mode: host
    restart: unless-stopped
